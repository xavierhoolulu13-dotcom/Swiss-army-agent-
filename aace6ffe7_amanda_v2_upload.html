<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Amanda XOS"/>
<link rel="manifest" id="pwaManifest"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amanda AI v2 — XOS · XKSH808</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --gold: #ffd700;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --green: #00d4aa;
    --xos: #a78bfa;
    --xos2: #38bdf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-size: 16px; font-weight: 700; }
  .logo-sub { font-size: 11px; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .status-badge { background: var(--green); color: #000; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
  .xos-badge { background: linear-gradient(90deg, var(--xos), var(--xos2)); color: #000; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }

  /* TABS */
  .tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 12px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }
  .tab.xos-tab.active { color: var(--xos); border-bottom-color: var(--xos); }
  .tab.xos-tab:hover { color: var(--xos); }

  /* PANELS */
  .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .panel.active { display: flex; }

  /* CHAT PANEL */
  .chat-container { display: flex; flex-direction: column; height: 100%; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; gap: 10px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .msg.amanda .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.user .msg-avatar { background: var(--card); border: 1px solid var(--border); }
  .msg.xos-agent .msg-avatar { background: linear-gradient(135deg, var(--xos), var(--xos2)); }
  .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
  .msg.amanda .msg-bubble { background: var(--card); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .msg-bubble { background: var(--accent); color: white; border-top-right-radius: 4px; }
  .msg.xos-agent .msg-bubble { background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.3); border-top-left-radius: 4px; }
  .msg-agent-tag { font-size: 10px; color: var(--xos); font-weight: 700; margin-bottom: 4px; letter-spacing: 0.5px; }
  .msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .typing { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: var(--card); border-radius: 14px; border-top-left-radius: 4px; width: fit-content; }
  .typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .chat-input-area {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .name-input-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
  .name-input-row input { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 13px; }
  .name-input-row input:focus { outline: none; border-color: var(--accent); }
  .mode-toggle { display: flex; gap: 4px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .mode-btn { padding: 4px 10px; border-radius: 6px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted); }
  .mode-btn.active { background: var(--accent); color: white; }
  .mode-btn.xos-active { background: linear-gradient(90deg, var(--xos), var(--xos2)); color: #000; }
  .input-row { display: flex; gap: 10px; }
  .chat-input { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 10px; font-size: 14px; resize: none; min-height: 44px; max-height: 120px; }
  .chat-input:focus { outline: none; border-color: var(--accent); }
  .chat-input.xos-mode { border-color: rgba(167,139,250,0.4); }
  .send-btn { background: var(--accent); border: none; color: white; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity 0.2s; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn.xos-send { background: linear-gradient(90deg, var(--xos), var(--xos2)); color: #000; }

  /* QUICK ACTIONS */
  .quick-actions { padding: 0 20px 12px; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
  .quick-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
  .quick-btn.xos-quick { border-color: rgba(167,139,250,0.3); color: var(--xos); }
  .quick-btn.xos-quick:hover { border-color: var(--xos); background: rgba(167,139,250,0.1); }

  /* COMMAND CENTER */
  .command-center { padding: 20px; overflow-y: auto; flex: 1; }
  .cc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-value.green { color: var(--green); }
  .stat-value.gold { color: var(--gold); }
  .stat-value.purple { color: var(--accent); }
  .stat-value.red { color: var(--accent2); }

  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .lead-table { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .lead-row { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
  .lead-row:last-child { border-bottom: none; }
  .lead-name { font-weight: 600; }
  .lead-biz { color: var(--muted); font-size: 12px; }
  .lead-status { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .status-new { background: rgba(108,99,255,0.2); color: var(--accent); }
  .status-contacted { background: rgba(255,215,0,0.15); color: var(--gold); }
  .status-site { background: rgba(0,212,170,0.15); color: var(--green); }
  .status-retainer { background: rgba(0,212,170,0.3); color: var(--green); }
  .add-lead-btn { background: var(--accent); border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; margin-bottom: 12px; }

  /* ADD LEAD FORM */
  .lead-form { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 20px; display: none; }
  .lead-form.visible { display: block; }
  .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .form-input { flex: 1; min-width: 140px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 13px; }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-submit { background: var(--green); border: none; color: #000; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; }

  /* PIPELINE */
  .pipeline-bar { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
  .pipeline-steps { display: flex; gap: 8px; flex-wrap: wrap; }
  .pipeline-step { flex: 1; min-width: 80px; text-align: center; padding: 10px 8px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); }
  .pipeline-step.active-step { border-color: var(--accent); background: rgba(108,99,255,0.1); }
  .step-num { font-size: 20px; font-weight: 700; color: var(--accent); }
  .step-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* XOS PANEL */
  .xos-panel { padding: 20px; overflow-y: auto; flex: 1; }
  .xos-header-card {
    background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(56,189,248,0.1));
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
  }
  .xos-title { font-size: 22px; font-weight: 800; background: linear-gradient(90deg, var(--xos), var(--xos2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .xos-subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .xos-version { display: inline-block; margin-top: 8px; font-size: 10px; font-weight: 700; color: var(--xos); border: 1px solid rgba(167,139,250,0.4); padding: 2px 10px; border-radius: 20px; }

  .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .agent-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .agent-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--xos), var(--xos2)); }
  .agent-card:hover { border-color: rgba(167,139,250,0.5); background: rgba(167,139,250,0.06); transform: translateY(-1px); }
  .agent-card.active-agent { border-color: rgba(167,139,250,0.6); background: rgba(167,139,250,0.1); }
  .agent-name { font-size: 12px; font-weight: 700; color: var(--xos); margin-bottom: 6px; font-family: monospace; }
  .agent-role { font-size: 12px; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
  .agent-greeting { font-size: 11px; color: var(--muted); font-style: italic; }
  .agent-select-btn { margin-top: 10px; width: 100%; padding: 6px; border-radius: 6px; border: 1px solid rgba(167,139,250,0.4); background: transparent; color: var(--xos); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .agent-select-btn:hover { background: rgba(167,139,250,0.15); }
  .agent-card.active-agent .agent-select-btn { background: linear-gradient(90deg, var(--xos), var(--xos2)); color: #000; border-color: transparent; }

  .xos-config-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .config-title { font-size: 12px; font-weight: 700; color: var(--xos); margin-bottom: 10px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.5px; }
  .config-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .config-row:last-child { border-bottom: none; }
  .config-key { color: var(--muted); font-family: monospace; }
  .config-val { color: var(--text); font-family: monospace; font-weight: 600; }
  .config-val.highlight { color: var(--xos); }

  .runtime-states { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .runtime-state { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: monospace; transition: all 0.3s; }
  .runtime-state.active-state { border-color: var(--xos); color: var(--xos); background: rgba(167,139,250,0.15); }

  .router-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .router-table th { text-align: left; padding: 8px 10px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  .router-table td { padding: 8px 10px; border-bottom: 1px solid rgba(42,42,58,0.5); }
  .router-table tr:last-child td { border-bottom: none; }
  .intent-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; background: rgba(167,139,250,0.15); color: var(--xos); font-family: monospace; font-size: 11px; }
  .agent-tag-small { font-family: monospace; font-size: 11px; color: var(--xos2); }

  .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .library-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .lib-icon { font-size: 20px; margin-bottom: 6px; }
  .lib-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .lib-type { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .fs-tree { font-family: monospace; font-size: 12px; color: var(--muted); line-height: 1.8; padding: 12px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
  .fs-folder { color: var(--xos2); }
  .fs-file { color: var(--muted); }


  /* OFFLINE BANNER */
  #offlineBanner { display:none; position:fixed; bottom:0; left:0; right:0; background:#ff6b6b; color:#fff; text-align:center; font-size:12px; font-weight:700; padding:6px; z-index:9999; }
  #offlineBanner.show { display:block; }
  .offline-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#fff; margin-right:5px; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }


  /* AGENT BUILDER */
  .builder-panel { padding: 20px; overflow-y: auto; flex: 1; }
  .builder-form { background: var(--card); border: 1px solid rgba(167,139,250,0.3); border-radius: 16px; padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
  .builder-form::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--xos), var(--xos2)); }
  .builder-label { font-size: 11px; font-weight: 700; color: var(--xos); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; font-family: monospace; }
  .builder-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; font-family: inherit; }
  .builder-input:focus { outline: none; border-color: rgba(167,139,250,0.6); }
  .builder-textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 13px; resize: vertical; min-height: 80px; font-family: inherit; margin-bottom: 14px; }
  .builder-textarea:focus { outline: none; border-color: rgba(167,139,250,0.6); }
  .emoji-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .emoji-opt { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .emoji-opt:hover, .emoji-opt.selected { border-color: var(--xos); background: rgba(167,139,250,0.15); }
  .intent-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .intent-tag-opt { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 11px; font-family: monospace; cursor: pointer; transition: all 0.2s; }
  .intent-tag-opt:hover, .intent-tag-opt.selected { border-color: var(--xos); color: var(--xos); background: rgba(167,139,250,0.1); }
  .builder-save-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(90deg, var(--xos), var(--xos2)); color: #000; font-size: 14px; font-weight: 800; cursor: pointer; letter-spacing: 0.5px; transition: opacity 0.2s; }
  .builder-save-btn:hover { opacity: 0.85; }
  .custom-agents-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .custom-agent-card { background: var(--card); border: 1px solid rgba(167,139,250,0.25); border-radius: 12px; padding: 16px; position: relative; overflow: hidden; }
  .custom-agent-card::before { content: 'CUSTOM'; position: absolute; top: 8px; right: 8px; font-size: 9px; font-weight: 700; color: var(--xos2); font-family: monospace; background: rgba(56,189,248,0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(56,189,248,0.3); }
  .cac-name { font-size: 12px; font-weight: 700; color: var(--xos); margin-bottom: 5px; font-family: monospace; }
  .cac-role { font-size: 12px; color: var(--text); line-height: 1.4; margin-bottom: 6px; }
  .cac-greeting { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 10px; }
  .cac-actions { display: flex; gap: 6px; }
  .cac-btn { flex: 1; padding: 6px; border-radius: 6px; border: 1px solid rgba(167,139,250,0.3); background: transparent; color: var(--xos); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .cac-btn:hover { background: rgba(167,139,250,0.15); }
  .cac-btn.del { border-color: rgba(255,107,107,0.3); color: var(--accent2); }
  .cac-btn.del:hover { background: rgba(255,107,107,0.1); }
  .empty-agents { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  .empty-agents .big { font-size: 36px; margin-bottom: 10px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* MOBILE */
  @media (max-width: 600px) {
    .header { padding: 10px 14px; }
    .chat-messages { padding: 14px; }
    .chat-input-area { padding: 12px 14px; }
    .command-center, .xos-panel { padding: 14px; }
    .name-input-row { flex-direction: column; }
    .agents-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="offlineBanner"><span class="offline-dot"></span>OFFLINE — XOS agents work locally · Amanda chat needs WiFi</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div>
      <div class="logo-text">Amanda AI
